game: "chess"

network:
  architecture: "resnet_se"
  num_blocks: 20
  num_filters: 256
  se_reduction: 4

mcts:
  simulations_per_move: 400   # halved from 800 — faster games; fine for early training
  c_puct: 2.5
  c_fpu: 0.25
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temperature_moves: 30
  concurrent_games: 256       # 4x previous — keeps eval queue full, workers mostly block on eval
  threads_per_game: 1         # 1 thread/game — eval latency dominates; saves CPU for more games
  batch_size: 256             # eval queue batch; code changes needed for larger effective batches
  resign_threshold: -0.9
  resign_disable_fraction: 0.1

training:
  batch_size: 4096            # 4x default — better GPU utilization per training step
  max_steps: 10000
  lr_schedule:
    - [0, 0.2]
    - [7000, 0.02]
    - [9000, 0.002]
  momentum: 0.9
  l2_reg: 0.0001
  checkpoint_interval: 1000
  milestone_interval: 5000
  log_interval: 50
  min_buffer_size: 8192       # 2x training batch — ensures diverse samples
  wait_for_buffer_seconds: 0.01

pipeline:
  inference_batches_per_cycle: 100  # 2x previous — more inference per cycle feeds training
  training_steps_per_cycle: 1

replay_buffer:
  capacity: 500000

evaluation:
  interval_steps: 5000
  num_games: 20
  simulations_per_move: 100

system:
  precision: "bf16"
  num_gpu: 1
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
