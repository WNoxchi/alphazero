game: "go"

network:
  architecture: "resnet_se"
  num_blocks: 20
  num_filters: 256
  se_reduction: 4

mcts:
  simulations_per_move: 400        # reduced from 800 — 2x faster self-play in early training
  enable_playout_cap: true         # KataGo-style: 75% of moves use reduced sims, 25% full
  reduced_simulations: 100
  full_playout_probability: 0.25
  c_puct: 1.5                     # ELF OpenGo / Leela Zero convention; AZ effective ~1.25
  c_fpu: 0.2                      # KataGo-style in-tree FPU reduction
  c_fpu_root: 0.0                 # No root FPU reduction; Dirichlet noise already drives exploration
  dirichlet_alpha: 0.03
  dynamic_dirichlet_alpha: true   # Scale alpha by legal-move count to keep per-move noise magnitude stable
  dirichlet_epsilon: 0.25
  temperature_moves: 30
  concurrent_games: 384            # higher parallelism keeps eval queue full and smooths GPU utilization
  threads_per_game: 1              # 1 thread/game — eval latency dominates; saves CPU for more games
  batch_size: 384                  # match concurrent_games for larger, more efficient inference batches
  node_arena_capacity: 2048        # 400 sims needs ~400 nodes; saves 22 GB vs default 8192
  resign_threshold: -0.9
  resign_disable_fraction: 0.1

training:
  batch_size: 4096                 # increased from 1024 — better GPU arithmetic intensity on 19x19
  max_steps: 700000                # matches DeepMind AZ (700K steps)
  lr_schedule:
    # DeepMind AZ schedule: drop at 14%, 43%, 71% of total steps
    # For different run lengths, scale milestones proportionally:
    #   steps  |  drop1   drop2   drop3
    #   350K   |  50K     150K    250K
    #   500K   |  70K     215K    355K
    #   700K   |  100K    300K    500K    (DeepMind default)
    #   1M     |  140K    430K    710K
    - [0, 0.2]
    - [100000, 0.02]
    - [300000, 0.002]
    - [500000, 0.0002]
  momentum: 0.9
  l2_reg: 0.0001
  checkpoint_interval: 1000
  milestone_interval: 25000
  log_interval: 50
  min_buffer_size: 8192            # 2x training batch — ensures diverse samples
  wait_for_buffer_seconds: 0.01

pipeline:
  inference_batches_per_cycle: 100 # 2x previous — more inference per cycle feeds training
  training_steps_per_cycle: 1

replay_buffer:
  capacity: 20000000               # ~23 GB compact; ~80K games of history (KataGo-scale window)

evaluation:
  interval_steps: 10000
  num_games: 20                    # reduced from 50 for faster eval rounds
  simulations_per_move: 100

system:
  precision: "bf16"
  compile: true
  num_gpu: 1
  checkpoint_dir: "./checkpoints_go"
  log_dir: "./logs_go"
