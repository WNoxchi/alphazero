game: "chess"

network:
  architecture: "resnet_se"
  num_blocks: 20
  num_filters: 256
  se_reduction: 4

mcts:
  simulations_per_move: 800
  c_puct: 2.5
  c_fpu: 0.25
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  temperature_moves: 30
  concurrent_games: 32
  threads_per_game: 8
  batch_size: 256
  resign_threshold: -0.9
  resign_disable_fraction: 0.1

training:
  batch_size: 1024
  max_steps: 700000
  lr_schedule:
    - [0, 0.2]
    - [200000, 0.02]
    - [400000, 0.002]
    - [600000, 0.0002]
  momentum: 0.9
  l2_reg: 0.0001
  checkpoint_interval: 1000
  milestone_interval: 50000
  log_interval: 100
  min_buffer_size: 10000

pipeline:
  inference_batches_per_cycle: 50
  training_steps_per_cycle: 1

replay_buffer:
  capacity: 1000000

evaluation:
  interval_steps: 10000
  num_games: 50
  simulations_per_move: 100

system:
  precision: "bf16"
  num_gpu: 1
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
