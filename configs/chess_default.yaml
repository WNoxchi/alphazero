game: "chess"

network:
  architecture: "resnet_se"
  num_blocks: 20
  num_filters: 256
  se_reduction: 4

mcts:
  simulations_per_move: 200   # reduced from 400 — 2x faster self-play in early training
  enable_playout_cap: true
  reduced_simulations: 50
  full_playout_probability: 0.25
  c_puct: 2.5
  c_fpu: 0.25
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25
  randomize_dirichlet_epsilon: true
  dirichlet_epsilon_min: 0.15
  dirichlet_epsilon_max: 0.35
  temperature_moves: 40
  concurrent_games: 384       # higher parallelism keeps eval queue full and smooths GPU utilization
  threads_per_game: 1         # 1 thread/game — eval latency dominates; saves CPU for more games
  batch_size: 384             # match concurrent games for larger, more efficient inference batches
  resign_threshold: -0.9
  resign_disable_fraction: 0.1

training:
  batch_size: 8192            # increased from 4096 — better GPU arithmetic intensity
  max_steps: 100000
  lr_schedule:
    - [0, 0.2]
    - [7000, 0.02]
    - [9000, 0.002]
  momentum: 0.9
  l2_reg: 0.0001
  checkpoint_interval: 1000
  milestone_interval: 5000
  log_interval: 50
  min_buffer_size: 16384      # 2x training batch — ensures diverse samples
  wait_for_buffer_seconds: 0.01

pipeline:
  inference_batches_per_cycle: 100  # 2x previous — more inference per cycle feeds training
  training_steps_per_cycle: 1

replay_buffer:
  capacity: 5000000

evaluation:
  interval_steps: 5000
  num_games: 20
  simulations_per_move: 100

system:
  precision: "bf16"
  compile: true
  num_gpu: 1
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
